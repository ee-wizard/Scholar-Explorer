default_language_version:
  python: python3

exclude: ^_bmad/

repos:
  # Fast checks first
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=2048']
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # Local hooks using project dependencies (via uv)
  # All tools configured in pyproject.toml (single source of truth)
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --config pyproject.toml --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        stages: [pre-commit]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --config pyproject.toml
        language: system
        types: [python]
        stages: [pre-commit]

      - id: bandit
        name: bandit
        entry: uv run bandit -c pyproject.toml
        language: system
        types: [python]
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy --config-file pyproject.toml
        language: system
        types: [python]
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: bash -c 'uv sync --group eval && uv run pytest -c pyproject.toml'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
