<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{タイトル}}</title>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =================================================================
       Kanagawaテーマ - CSS変数
       ================================================================= */
    :root {
      /* カラーパレット */
      --bg-dark: #1F1F28;
      --bg-dim: #2A2A37;
      --bg-card: #363646;
      --fg: #DCD7BA;
      --fg-dim: #727169;
      --wave-blue: #7E9CD8;
      --spring-violet: #9CABCA;
      --sakura-pink: #D27E99;
      --wave-aqua: #7AA89F;
      --autumn-yellow: #DCA561;
      --sumi-ink: #363646;
      --fuji-gray: #54546D;

      /* ===================================
         16:9 アスペクト比（必須制約）
         =================================== */
      --slide-aspect-ratio: 16 / 9;
      /* ビューポートに収まる最大サイズを計算 */
      --slide-max-width: min(100vw, calc(100vh * (16 / 9)));
      --slide-max-height: min(100vh, calc(100vw * (9 / 16)));

      /* フォントサイズスケール（この値を変更すると全体のサイズが変わる） */
      --font-scale: 1.3;

      /* 計算されたフォントサイズ */
      --fs-title: calc(5rem * var(--font-scale));
      --fs-subtitle: calc(2.5rem * var(--font-scale));
      --fs-heading: calc(3rem * var(--font-scale));
      --fs-subheading: calc(2rem * var(--font-scale));
      --fs-body: calc(1.5rem * var(--font-scale));
      --fs-body-lg: calc(1.8rem * var(--font-scale));
      --fs-small: calc(1.2rem * var(--font-scale));
      --fs-icon-lg: calc(6rem * var(--font-scale));
      --fs-icon-md: calc(3rem * var(--font-scale));
      --fs-icon-sm: calc(2rem * var(--font-scale));
    }

    /* =================================================================
       ユーティリティクラス
       ================================================================= */
    .text-note {
      font-size: calc(1.1rem * var(--font-scale));
      color: var(--fg-dim);
    }

    .text-emphasis {
      font-size: calc(1.3rem * var(--font-scale));
    }

    .text-caption {
      font-size: calc(1.2rem * var(--font-scale));
    }

    .highlight {
      color: var(--autumn-yellow);
      font-weight: 700;
    }

    .highlight-pink {
      color: var(--sakura-pink);
    }

    .highlight-aqua {
      color: var(--wave-aqua);
    }

    /* =================================================================
       共通スタイル
       ================================================================= */
    *, *:after, *:before {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-dark);
      color: var(--fg);
      overflow: hidden;
    }

    /* =================================================================
       スライダー基本 - 16:9アスペクト比を厳守
       ================================================================= */

    /* スライダー全体: ビューポート中央に16:9で配置 */
    .slider {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg-dark);
    }

    /* スライドエリア: 16:9を強制（レターボックス/ピラーボックス対応） */
    .slide-area {
      width: var(--slide-max-width);
      height: var(--slide-max-height);
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: var(--bg-dark);
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    /* スライドコンテナ: 横スクロール用 */
    .slider__container {
      display: flex;
      width: 100%;
      height: 100%;
      transition: none;
    }

    /* 各スライド: 16:9エリア全体を使用 */
    .slider__item {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3%;
      aspect-ratio: 16 / 9;
    }

    /* スライドコンテンツ: 16:9内に収まるよう制約 */
    .slider__content {
      width: 100%;
      max-width: 94%;
      max-height: 94%;
      visibility: hidden;
      overflow: hidden;
    }

    /* =================================================================
       アイコンスタイル
       ================================================================= */
    .icon-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--bg-dim);
      margin-bottom: 1rem;
    }

    .icon-wrapper i {
      font-size: 2.5rem;
      color: var(--wave-blue);
    }

    .icon-wrapper.accent-pink i { color: var(--sakura-pink); }
    .icon-wrapper.accent-aqua i { color: var(--wave-aqua); }
    .icon-wrapper.accent-yellow i { color: var(--autumn-yellow); }
    .icon-wrapper.accent-violet i { color: var(--spring-violet); }

    /* =================================================================
       進捗バー
       ================================================================= */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--sumi-ink);
      z-index: 100;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, var(--wave-blue), var(--sakura-pink));
      transition: width 0.5s ease;
    }

    /* =================================================================
       ナビゲーション
       ================================================================= */
    .slider-navigation {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      z-index: 100;
    }

    .slider-navigation li {
      list-style: none;
    }

    .slider-navigation a {
      display: block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--fg);
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .slider-navigation a.is-active {
      background: var(--wave-blue);
      border-color: var(--wave-blue);
    }

    /* =================================================================
       スライド番号
       ================================================================= */
    .slide-number {
      position: fixed;
      bottom: 1.5rem;
      right: 2rem;
      font-size: 0.9rem;
      color: var(--fg-dim);
      font-family: 'Noto Sans JP', sans-serif;
      z-index: 100;
    }

    /* =================================================================
       アジェンダインジケーター（左上固定）
       ================================================================= */
    .agenda-indicator {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      z-index: 100;
      background: var(--bg-dim);
      padding: 0.8rem 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      border: 1px solid var(--fuji-gray);
    }
    .agenda-indicator-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
      color: var(--fg-dim);
      font-size: 0.85rem;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .agenda-indicator-item:hover {
      background: var(--bg-card);
      color: var(--fg);
    }
    .agenda-indicator-item.active {
      color: var(--wave-blue);
      font-weight: 600;
      background: rgba(126, 156, 216, 0.15);
    }
    .agenda-indicator-item .agenda-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--fuji-gray);
      flex-shrink: 0;
    }
    .agenda-indicator-item.active .agenda-dot {
      background: var(--wave-blue);
    }
    .agenda-indicator-item .agenda-label {
      white-space: nowrap;
    }

    /* =================================================================
       コントロール
       ================================================================= */
    .slider-controls {
      position: fixed;
      top: 50%;
      width: 100%;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 1rem;
      z-index: 100;
      pointer-events: none;
    }

    .slider-controls button {
      width: 50px;
      height: 50px;
      background: var(--bg-dim);
      border: 2px solid var(--fuji-gray);
      border-radius: 50%;
      color: var(--fg);
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .slider-controls button:hover {
      background: var(--wave-blue);
      border-color: var(--wave-blue);
    }

    /* =================================================================
       タイトルスライド
       ================================================================= */
    .slide-title .slider__content {
      text-align: center;
    }

    .slide-title .main-title {
      font-size: var(--fs-title);
      font-weight: 700;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .slide-title .sub-title {
      font-size: var(--fs-subtitle);
      color: var(--fg-dim);
    }

    .slide-title .title-icon {
      font-size: var(--fs-icon-lg);
      color: var(--wave-blue);
      margin-bottom: 2.5rem;
    }

    /* =================================================================
       メッセージスライド
       ================================================================= */
    .slide-message .slider__content {
      text-align: center;
    }

    .slide-message .message-icon {
      margin: 0 auto 2rem;
    }

    .slide-message .main-message {
      font-size: var(--fs-heading);
      font-weight: 700;
      line-height: 1.3;
    }

    .slide-message .sub-message {
      font-size: var(--fs-body);
      color: var(--fg-dim);
      margin-top: 1.5rem;
      max-width: 80%;
      margin-left: auto;
      margin-right: auto;
    }

    /* =================================================================
       リストスライド
       ================================================================= */
    .slide-list .slider__content {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .slide-list .list-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
      margin-bottom: 2rem;
    }

    .slide-list .list-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      justify-content: center;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .slide-list .list-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--bg-dim);
      padding: 1.5rem 2rem;
      border-radius: 16px;
      border-left: 5px solid var(--wave-blue);
      white-space: nowrap;
    }

    .slide-list .list-item i {
      font-size: var(--fs-subheading);
      color: var(--wave-blue);
    }

    .slide-list .list-item span {
      font-size: var(--fs-body);
    }

    /* =================================================================
       比較スライド
       ================================================================= */
    .slide-compare .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-compare .compare-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-compare .compare-container {
      display: flex;
      gap: 3rem;
      justify-content: center;
      align-items: stretch;
      width: 100%;
    }

    .slide-compare .compare-item {
      flex: 1;
      max-width: 550px;
      background: var(--bg-dim);
      padding: 3rem;
      border-radius: 20px;
      text-align: center;
    }

    .slide-compare .compare-item.left {
      border-top: 4px solid var(--sakura-pink);
    }

    .slide-compare .compare-item.right {
      border-top: 4px solid var(--wave-aqua);
    }

    .slide-compare .compare-item h3 {
      font-size: var(--fs-subheading);
      margin-bottom: 1.5rem;
    }

    .slide-compare .compare-item .value {
      font-size: var(--fs-title);
      font-weight: 700;
    }

    .slide-compare .compare-item.left .value {
      color: var(--sakura-pink);
    }

    .slide-compare .compare-item.right .value {
      color: var(--wave-aqua);
    }

    .slide-compare .compare-vs {
      display: flex;
      align-items: center;
      font-size: var(--fs-subheading);
      font-weight: 700;
      color: var(--autumn-yellow);
    }

    /* =================================================================
       フロースライド
       ================================================================= */
    .slide-flow .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-flow .flow-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-flow .flow-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      width: 100%;
    }

    .slide-flow .flow-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-dim);
      padding: 2rem 2.5rem;
      border-radius: 16px;
      min-width: 180px;
      flex: 1;
      max-width: 280px; /* 十分な幅でテキスト切れを防止 */
    }

    .slide-flow .flow-step .step-number {
      width: 50px;
      height: 50px;
      background: var(--wave-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.5rem;
    }

    .slide-flow .flow-step i {
      font-size: var(--fs-icon-md);
      color: var(--wave-aqua);
      margin: 0.75rem 0;
    }

    .slide-flow .flow-step span {
      font-size: var(--fs-body);
      text-align: center;
    }

    .slide-flow .flow-arrow {
      font-size: var(--fs-subheading);
      color: var(--autumn-yellow);
    }

    /* =================================================================
       タイムラインスライド
       ================================================================= */
    .slide-timeline .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-timeline .timeline-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-timeline .timeline-container {
      position: relative;
      padding-left: 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .slide-timeline .timeline-line {
      position: absolute;
      left: 1.5rem;
      top: 0;
      bottom: 0;
      width: 5px;
      background: var(--wave-blue);
      border-radius: 3px;
    }

    .slide-timeline .timeline-item {
      position: relative;
      padding: 1.5rem 0 1.5rem 2.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
    }

    .slide-timeline .timeline-dot {
      position: absolute;
      left: -3rem;
      width: 24px;
      height: 24px;
      background: var(--wave-blue);
      border-radius: 50%;
      border: 5px solid var(--bg-dark);
    }

    .slide-timeline .timeline-content {
      background: var(--bg-dim);
      padding: 1.5rem 2rem;
      border-radius: 12px;
      flex: 1;
    }

    .slide-timeline .timeline-content h4 {
      font-size: var(--fs-body);
      color: var(--wave-blue);
      margin-bottom: 0.75rem;
    }

    .slide-timeline .timeline-content p {
      font-size: var(--fs-small);
    }

    /* =================================================================
       テーブルスライド
       ================================================================= */
    .slide-table .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-table .table-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-table table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-dim);
      border-radius: 16px;
      overflow: hidden;
    }

    .slide-table th {
      background: var(--sumi-ink);
      padding: 1.5rem 2rem;
      text-align: left;
      font-weight: 700;
      font-size: var(--fs-body);
      color: var(--wave-blue);
      border-bottom: 3px solid var(--fuji-gray);
    }

    .slide-table td {
      padding: 1.25rem 2rem;
      font-size: var(--fs-small);
      border-bottom: 1px solid var(--fuji-gray);
    }

    .slide-table tr:last-child td {
      border-bottom: none;
    }

    .slide-table .table-icon {
      color: var(--wave-aqua);
      margin-right: 0.75rem;
      font-size: 1.3rem;
    }

    /* =================================================================
       アジェンダスライド
       ================================================================= */
    .slide-agenda .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .slide-agenda .agenda-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
      color: var(--wave-blue);
    }

    .slide-agenda .agenda-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }

    .slide-agenda .agenda-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--bg-dim);
      padding: 1.5rem 2.5rem;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .slide-agenda .agenda-item:hover {
      transform: translateX(10px);
      background: var(--bg-card);
    }

    .slide-agenda .agenda-number {
      width: 48px;
      height: 48px;
      background: var(--wave-blue);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .slide-agenda .agenda-item i {
      font-size: var(--fs-body);
      color: var(--wave-aqua);
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .slide-agenda .agenda-text {
      font-size: var(--fs-body);
      flex: 1;
    }

    .slide-agenda .agenda-item.active {
      border-left: 5px solid var(--sakura-pink);
      background: var(--bg-card);
    }

    /* =================================================================
       セクションヘッダースライド
       ================================================================= */
    .slide-section .slider__content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .slide-section .section-number {
      font-size: var(--fs-body);
      color: var(--fg-dim);
      margin-bottom: 1rem;
      letter-spacing: 0.3em;
    }

    .slide-section .section-icon {
      font-size: var(--fs-icon-lg);
      color: var(--wave-blue);
      margin-bottom: 2rem;
    }

    .slide-section .section-title {
      font-size: var(--fs-title);
      font-weight: 700;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .slide-section .section-subtitle {
      font-size: var(--fs-subheading);
      color: var(--fg-dim);
      max-width: 80%;
    }

    .slide-section .section-divider {
      width: 120px;
      height: 5px;
      background: linear-gradient(90deg, var(--wave-blue), var(--sakura-pink));
      border-radius: 3px;
      margin: 2rem 0;
    }

    /* =================================================================
       統計スライド（大きな数字を強調）
       ================================================================= */
    .slide-stats .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-stats .stats-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-stats .stats-container {
      display: flex;
      gap: 3rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .slide-stats .stat-item {
      flex: 1;
      min-width: 200px;
      max-width: 350px;
      text-align: center;
      background: var(--bg-dim);
      padding: 3rem 2rem;
      border-radius: 20px;
    }

    .slide-stats .stat-item i {
      font-size: var(--fs-icon-md);
      color: var(--wave-blue);
      margin-bottom: 1.5rem;
    }

    .slide-stats .stat-value {
      font-size: var(--fs-heading); /* --fs-titleより小さく、切れを防止 */
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1rem;
      white-space: nowrap; /* 改行防止 */
      background: linear-gradient(135deg, var(--wave-blue), var(--sakura-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide-stats .stat-label {
      font-size: var(--fs-body);
      color: var(--fg-dim);
    }

    .slide-stats .stat-item:nth-child(2) .stat-value {
      background: linear-gradient(135deg, var(--wave-aqua), var(--autumn-yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide-stats .stat-item:nth-child(3) .stat-value {
      background: linear-gradient(135deg, var(--sakura-pink), var(--spring-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* =================================================================
       引用スライド
       ================================================================= */
    .slide-quote .slider__content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .slide-quote .quote-mark {
      font-size: 8rem;
      color: var(--wave-blue);
      opacity: 0.3;
      line-height: 0.5;
      margin-bottom: 1rem;
    }

    .slide-quote .quote-text {
      font-size: var(--fs-heading);
      font-weight: 400;
      font-style: italic;
      line-height: 1.5;
      max-width: 85%;
      margin-bottom: 2rem;
    }

    .slide-quote .quote-author {
      font-size: var(--fs-body);
      color: var(--fg-dim);
    }

    .slide-quote .quote-author::before {
      content: '— ';
    }

    .slide-quote .quote-source {
      font-size: var(--fs-small);
      color: var(--fuji-gray);
      margin-top: 0.5rem;
    }

    /* =================================================================
       画像スライド（画像+テキスト）
       ================================================================= */
    .slide-image .slider__content {
      display: flex;
      gap: 3rem;
      align-items: center;
    }

    .slide-image .image-container {
      flex: 1;
      max-width: 55%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .slide-image .image-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .slide-image .image-content {
      flex: 1;
      max-width: 45%;
    }

    .slide-image .image-title {
      font-size: var(--fs-subheading);
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    .slide-image .image-description {
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--fg);
    }

    .slide-image .image-caption {
      font-size: 1rem;
      color: var(--fg-dim);
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--fuji-gray);
    }

    /* 画像左配置バリエーション */
    .slide-image.image-left .slider__content {
      flex-direction: row;
    }

    /* 画像右配置バリエーション */
    .slide-image.image-right .slider__content {
      flex-direction: row-reverse;
    }

    /* =================================================================
       フルスクリーン画像スライド
       ================================================================= */
    .slide-fullimage {
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .slide-fullimage::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg,
        rgba(31, 31, 40, 0.3) 0%,
        rgba(31, 31, 40, 0.7) 50%,
        rgba(31, 31, 40, 0.9) 100%);
    }

    .slide-fullimage .slider__content {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8rem;
    }

    .slide-fullimage .fullimage-title {
      font-size: var(--fs-title);
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .slide-fullimage .fullimage-subtitle {
      font-size: var(--fs-subheading);
      color: var(--fg);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    /* =================================================================
       図解スライド（ダイアグラム）
       ================================================================= */
    .slide-diagram .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-diagram .diagram-title {
      font-size: var(--fs-heading);
      font-weight: 700;
      text-align: center;
    }

    .slide-diagram .diagram-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      width: 100%;
    }

    /* サークル型図解 */
    .slide-diagram .diagram-circle {
      position: relative;
      width: 500px;
      height: 500px;
    }

    .slide-diagram .diagram-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 180px;
      background: var(--wave-blue);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 10px 40px rgba(126, 156, 216, 0.3);
    }

    .slide-diagram .diagram-center i {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .slide-diagram .diagram-center span {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .slide-diagram .diagram-node {
      position: absolute;
      width: 140px;
      height: 140px;
      background: var(--bg-dim);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 3px solid var(--fuji-gray);
      transition: all 0.3s ease;
    }

    .slide-diagram .diagram-node:hover {
      transform: scale(1.1);
      border-color: var(--wave-blue);
    }

    .slide-diagram .diagram-node i {
      font-size: 1.8rem;
      color: var(--wave-aqua);
      margin-bottom: 0.5rem;
    }

    .slide-diagram .diagram-node span {
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* ノード位置（6つの場合の例） */
    .slide-diagram .diagram-node:nth-child(2) { top: 0; left: 50%; transform: translateX(-50%); }
    .slide-diagram .diagram-node:nth-child(3) { top: 15%; right: 5%; }
    .slide-diagram .diagram-node:nth-child(4) { bottom: 15%; right: 5%; }
    .slide-diagram .diagram-node:nth-child(5) { bottom: 0; left: 50%; transform: translateX(-50%); }
    .slide-diagram .diagram-node:nth-child(6) { bottom: 15%; left: 5%; }
    .slide-diagram .diagram-node:nth-child(7) { top: 15%; left: 5%; }

    /* ピラミッド型図解 */
    .slide-diagram .diagram-pyramid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .slide-diagram .pyramid-level {
      background: var(--bg-dim);
      padding: 1.5rem 2rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-align: center;
      justify-content: center;
    }

    .slide-diagram .pyramid-level:nth-child(1) { width: 250px; background: var(--wave-blue); }
    .slide-diagram .pyramid-level:nth-child(2) { width: 400px; }
    .slide-diagram .pyramid-level:nth-child(3) { width: 550px; }
    .slide-diagram .pyramid-level:nth-child(4) { width: 700px; }

    .slide-diagram .pyramid-level i {
      font-size: 1.5rem;
    }

    .slide-diagram .pyramid-level span {
      font-size: 1.3rem;
      font-weight: 600;
    }

    /* =================================================================
       チャート/グラフスライド
       ================================================================= */
    .slide-chart .slider__content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .slide-chart .chart-title {
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
    }

    .slide-chart .chart-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 2rem;
      width: 100%;
      padding: 2rem;
    }

    /* 棒グラフ */
    .slide-chart .bar-chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3rem;
      height: 400px;
      padding: 2rem 0;
    }

    .slide-chart .bar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .slide-chart .bar {
      width: 80px;
      background: linear-gradient(180deg, var(--wave-blue), var(--spring-violet));
      border-radius: 8px 8px 0 0;
      position: relative;
      transition: all 0.3s ease;
    }

    .slide-chart .bar:hover {
      transform: scaleY(1.02);
    }

    .slide-chart .bar-value {
      position: absolute;
      top: -35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--wave-blue);
    }

    .slide-chart .bar-label {
      font-size: 1.1rem;
      color: var(--fg-dim);
      text-align: center;
      max-width: 100px;
    }

    .slide-chart .bar-item:nth-child(2) .bar {
      background: linear-gradient(180deg, var(--sakura-pink), var(--autumn-yellow));
    }
    .slide-chart .bar-item:nth-child(2) .bar-value { color: var(--sakura-pink); }

    .slide-chart .bar-item:nth-child(3) .bar {
      background: linear-gradient(180deg, var(--wave-aqua), var(--wave-blue));
    }
    .slide-chart .bar-item:nth-child(3) .bar-value { color: var(--wave-aqua); }

    .slide-chart .bar-item:nth-child(4) .bar {
      background: linear-gradient(180deg, var(--autumn-yellow), var(--sakura-pink));
    }
    .slide-chart .bar-item:nth-child(4) .bar-value { color: var(--autumn-yellow); }

    /* 円グラフ（CSS描画） */
    .slide-chart .pie-chart {
      display: flex;
      align-items: center;
      gap: 4rem;
    }

    .slide-chart .pie {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      position: relative;
    }

    .slide-chart .pie-legend {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .slide-chart .legend-item {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .slide-chart .legend-color {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .slide-chart .legend-label {
      font-size: 1.2rem;
    }

    .slide-chart .legend-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--wave-blue);
    }

    /* =================================================================
       印刷用スタイル（PDF出力）
       全ページ印刷対応 - Ctrl+P / Cmd+P で全スライドをPDF出力
       ================================================================= */
    /* =================================================================
       印刷用スタイル - 16:9 on A4横 (100%スケール対応)

       計算根拠:
       - A4横 印刷可能領域: 281mm × 194mm (8mm余白)
       - 16:9スライド: 281mm × 158mm
       - 縦余白: 18mm（上下均等配置）
       ================================================================= */
    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      /* 印刷不要要素を非表示 */
      .progress-bar,
      .slider-navigation,
      .slider-controls,
      .slide-number,
      .agenda-indicator {
        display: none !important;
      }

      body, html {
        background: white !important;
        overflow: visible !important;
        height: auto !important;
      }

      .slider {
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        display: block !important;
        background: white !important;
      }

      .slide-area {
        width: 100% !important;
        height: auto !important;
        overflow: visible !important;
        box-shadow: none !important;
      }

      .slider__container {
        display: block !important;
        transform: none !important;
        width: 100% !important;
      }

      /* 16:9スライドアイテム - A4横に最適化 */
      .slider__item {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        /* 16:9固定サイズ */
        width: 281mm !important;
        height: 158mm !important;
        aspect-ratio: 16 / 9 !important;
        /* 中央配置 */
        margin: 18mm auto !important;
        padding: 10mm !important;
        background: white !important;
        border: 1px solid #DDD !important;
        border-radius: 4px !important;
        box-sizing: border-box !important;
        position: relative !important;
        page-break-after: always !important;
        page-break-inside: avoid !important;
        overflow: hidden !important;
      }

      .slider__item:last-child {
        page-break-after: auto !important;
      }

      /* スライドコンテンツ - 16:9内に収める */
      .slider__content {
        visibility: visible !important;
        opacity: 1 !important;
        transform: none !important;
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
        max-height: 100% !important;
        padding: 20px !important;
        box-sizing: border-box !important;
        overflow: visible !important;
      }

      /* 各スライドタイプのdisplay維持 */
      .slide-title .slider__content,
      .slide-message .slider__content {
        display: block !important;
        text-align: center !important;
      }

      .slide-agenda .slider__content,
      .slide-list .slider__content,
      .slide-compare .slider__content,
      .slide-flow .slider__content,
      .slide-stats .slider__content,
      .slide-section .slider__content {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
      }

      /* コンテナのレイアウト維持 */
      .agenda-container {
        display: grid !important;
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 0.8rem !important;
        width: 100% !important;
        visibility: visible !important;
      }

      .list-container {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 1rem !important;
        justify-content: center !important;
        width: 100% !important;
        visibility: visible !important;
      }

      .compare-container {
        display: flex !important;
        gap: 1.5rem !important;
        justify-content: center !important;
        width: 100% !important;
        visibility: visible !important;
      }

      .flow-container {
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 0.5rem !important;
        flex-wrap: wrap !important;
        width: 100% !important;
        visibility: visible !important;
      }

      .stats-container {
        display: flex !important;
        gap: 2rem !important;
        justify-content: center !important;
        width: 100% !important;
        visibility: visible !important;
      }

      /* 全子要素の表示保証 */
      .slider__content,
      .slider__content * {
        visibility: visible !important;
        opacity: 1 !important;
        transform: none !important;
      }

      /* 全スライドタイプ要素の表示保証 */
      .agenda-item, .list-item, .compare-item, .flow-step, .flow-arrow,
      .stat-item, .timeline-item, .timeline-content,
      .compare-vs, .message-icon, .icon-wrapper,
      /* circle */
      .circle-container, .circle-center, .circle-item,
      .circle-icon, .circle-label, .circle-description,
      /* timeline */
      .timeline-container, .timeline-line, .timeline-dot,
      .timeline-date, .timeline-title, .timeline-desc,
      /* pyramid */
      .pyramid-container, .pyramid-level, .pyramid-text,
      /* quote */
      .quote-container, .quote-mark, .quote-text, .quote-author,
      /* process */
      .process-container, .process-step, .process-arrow,
      .process-icon, .process-title, .process-desc,
      /* grid */
      .grid-container, .grid-card, .grid-icon,
      .grid-title, .grid-text,
      /* icon-grid */
      .icon-grid-container, .icon-grid-item,
      .icon-grid-icon, .icon-grid-text,
      /* hero */
      .hero-container, .hero-badge, .hero-title,
      .hero-subtitle, .hero-stats, .hero-stat,
      .hero-stat-value, .hero-stat-label,
      /* highlight */
      .highlight-icon, .highlight-value,
      .highlight-label, .highlight-description,
      /* fabe */
      .fabe-container, .fabe-card, .fabe-icon,
      .fabe-label, .fabe-title, .fabe-content,
      /* matrix */
      .matrix-container, .matrix-cell, .matrix-header,
      .matrix-label, .matrix-content,
      /* table */
      .table-container, table, thead, tbody, tr, th, td,
      /* その他共通要素 */
      .main-title, .sub-title, .section-title,
      .main-message, .sub-message, .title-icon {
        visibility: visible !important;
        opacity: 1 !important;
        transform: none !important;
      }

      /* スライド番号（CSS counter使用） */
      body {
        counter-reset: slide-counter;
      }

      .slider__item {
        counter-increment: slide-counter;
      }

      .slider__item::before {
        content: counter(slide-counter) " / " attr(data-total);
        position: absolute !important;
        bottom: 10px !important;
        right: 15px !important;
        font-size: 9pt !important;
        color: #888 !important;
        font-family: 'Noto Sans JP', sans-serif !important;
      }

      /* フォントサイズ縮小（印刷用） */
      .main-title { font-size: 2rem !important; }
      .sub-title { font-size: 1rem !important; }
      .section-title { font-size: 1.8rem !important; }
      .list-title, .flow-title, .compare-title, .table-title,
      .agenda-title, .stats-title { font-size: 1.3rem !important; }
      .main-message { font-size: 1.5rem !important; }
      .sub-message { font-size: 0.9rem !important; }
      .stat-value { font-size: 2rem !important; }

      .icon-wrapper {
        width: 50px !important;
        height: 50px !important;
      }

      .icon-wrapper i {
        font-size: 1.5rem !important;
      }

      .title-icon {
        font-size: 2.5rem !important;
      }

      /* カラー反転（ライトモード） */
      .slider__item {
        background: white !important;
      }

      .list-item, .compare-item, .flow-step, .timeline-content,
      .agenda-item, .stat-item, .icon-wrapper {
        background: #F5F5F5 !important;
        border: 1px solid #DDD !important;
      }

      h1, h2, h3, h4, h5, h6, p, span, li, td, th,
      .main-title, .sub-title, .main-message, .sub-message,
      .list-title, .list-item span, .compare-title,
      .flow-title, .flow-step span, .timeline-title,
      .agenda-title, .agenda-text, .section-title,
      .section-subtitle, .section-number, .stats-title, .stat-label {
        color: #1F1F28 !important;
        -webkit-text-fill-color: #1F1F28 !important;
      }

      .stat-value {
        background: none !important;
        -webkit-background-clip: unset !important;
        background-clip: unset !important;
        -webkit-text-fill-color: #7E9CD8 !important;
        color: #7E9CD8 !important;
      }

      .text-note, .text-caption, .sub-title, .sub-message {
        color: #666666 !important;
        -webkit-text-fill-color: #666666 !important;
      }

      /* アクセントカラー維持 */
      .highlight, .accent-yellow { color: #DCA561 !important; -webkit-text-fill-color: #DCA561 !important; }
      .highlight-pink, .accent-pink { color: #D27E99 !important; -webkit-text-fill-color: #D27E99 !important; }
      .highlight-aqua, .accent-aqua { color: #7AA89F !important; -webkit-text-fill-color: #7AA89F !important; }

      i.fa, i.fas, i.far, i.fab, .icon, [class*="fa-"] {
        color: #54546D !important;
      }

      .icon-wrapper i, .title-icon, .section-icon, .message-icon i,
      .list-item i, .flow-step i, .stat-item i {
        color: #7E9CD8 !important;
      }

      .icon-wrapper.accent-pink i { color: #D27E99 !important; }
      .icon-wrapper.accent-aqua i { color: #7AA89F !important; }
      .icon-wrapper.accent-yellow i { color: #DCA561 !important; }

      .flow-arrow {
        color: #DCA561 !important;
      }

      .step-number, .agenda-number {
        background: #7E9CD8 !important;
        color: white !important;
      }

      .section-divider {
        background: linear-gradient(90deg, #7E9CD8, #D27E99) !important;
        print-color-adjust: exact !important;
        -webkit-print-color-adjust: exact !important;
      }

      /* テーブル印刷用 */
      table {
        border-collapse: collapse !important;
        width: 100% !important;
      }

      th {
        background: #E8E8E8 !important;
        color: #1F1F28 !important;
        border: 1px solid #CCC !important;
      }

      td {
        background: white !important;
        color: #1F1F28 !important;
        border: 1px solid #DDD !important;
      }
    }
  </style>
</head>
<body>
  <!-- 進捗バー -->
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <!-- アジェンダインジケーター（左上固定・クリックでジャンプ）
       セクション定義は{{AGENDA_SECTIONS}}プレースホルダーで設定 -->
  <div class="agenda-indicator" id="agendaIndicator">
    {{AGENDA_INDICATOR_ITEMS}}
  </div>

  <!-- スライダー（16:9アスペクト比を厳守） -->
  <div class="slider" id="slider">
    <!-- slide-area: 16:9を強制するコンテナ -->
    <div class="slide-area">
      <div class="slider__container">
        <!-- ここにスライドを挿入 -->
        {{スライドHTML}}
      </div>
    </div>
  </div>

  <!-- ナビゲーション -->
  <ul class="slider-navigation" id="navigation"></ul>

  <!-- コントロール -->
  <div class="slider-controls">
    <button id="prev"><i class="fas fa-chevron-left"></i></button>
    <button id="next"><i class="fas fa-chevron-right"></i></button>
  </div>

  <!-- スライド番号 -->
  <div class="slide-number" id="slideNumber">1 / {{総スライド数}}</div>

  <!-- PDF出力: Cmd+P (Mac) / Ctrl+P (Windows) で印刷ダイアログを開く -->

  <script>
    // =================================================================
    // アニメーション定義
    // =================================================================
    const animations = {
      // タイトルスライド
      'slide-title': {
        enter: (content) => {
          const tl = gsap.timeline();
          const icon = content.querySelector('.title-icon');
          const title = content.querySelector('.main-title');
          const subtitle = content.querySelector('.sub-title');

          gsap.set(content, { visibility: 'visible' });

          tl.fromTo(icon,
            { scale: 0, rotation: -180 },
            { scale: 1, rotation: 0, duration: 0.4, ease: 'back.out(1.7)' }
          )
          .fromTo(title,
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.3, ease: 'power3.out' },
            '-=0.15'
          )
          .fromTo(subtitle,
            { y: 30, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.25, ease: 'power2.out' },
            '-=0.1'
          );
          return tl;
        },
        leave: (content) => {
          const tl = gsap.timeline();
          tl.to(content.children, {
            scale: 1.1,
            opacity: 0,
            duration: 0.2,
            stagger: 0.05,
            ease: 'power2.in'
          });
          return tl;
        }
      },

      // メッセージスライド
      'slide-message': {
        enter: (content) => {
          const tl = gsap.timeline();
          const icon = content.querySelector('.message-icon');
          const message = content.querySelector('.main-message');
          const sub = content.querySelector('.sub-message');

          gsap.set(content, { visibility: 'visible' });

          tl.fromTo(icon,
            { scale: 0 },
            { scale: 1, duration: 0.25, ease: 'back.out(1.7)' }
          )
          .fromTo(message,
            { y: 50, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.3, ease: 'power3.out' },
            '-=0.1'
          );

          if (sub) {

    // =================================================================
    // TweenSliderクラス（16:9対応）
    // =================================================================
    class TweenSlider {
      constructor(selector) {
        this.slider = document.querySelector(selector);
        this.slideArea = document.querySelector(selector + ' .slide-area');
        this.container = document.querySelector(selector + ' .slider__container');
        this.items = document.querySelectorAll(selector + ' .slider__item');
        this.index = 0;
        this.isAnimating = false;
        // 16:9エリアの幅を使用（ビューポートではなく）
        this.slideWidth = this.slideArea ? this.slideArea.offsetWidth : window.innerWidth;

        this.init();
      }

      init() {
        this.buildNavigation();
        this.bindEvents();
        this.makeActive(0);
        this.playEnterAnimation(0);
        this.updateProgress();
      }

      buildNavigation() {
        const nav = document.getElementById('navigation');
        this.items.forEach((_, i) => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = '#' + i;
          a.dataset.index = i;
          a.addEventListener('click', (e) => {
            e.preventDefault();
            this.move(i);
          });
          li.appendChild(a);
          nav.appendChild(li);
        });
      }

      bindEvents() {
        document.getElementById('next').addEventListener('click', () => this.moveToNext());
        document.getElementById('prev').addEventListener('click', () => this.moveToPrev());

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') {
            e.preventDefault();
            this.moveToNext();
          }
          if (e.key === 'ArrowLeft') this.moveToPrev();
        });

        window.addEventListener('resize', () => {
          // 16:9エリアの幅を再計算
          this.slideWidth = this.slideArea ? this.slideArea.offsetWidth : window.innerWidth;
          gsap.set(this.container, { x: -this.index * this.slideWidth });
        });

        // スワイプ対応（デフォルト有効）
        this.bindSwipeEvents();
      }

      // スワイプイベント（タッチデバイス対応）
      bindSwipeEvents() {
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        const minSwipeDistance = 50;
        const target = this.slideArea || this.slider;

        target.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].screenX;
          touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        target.addEventListener('touchend', (e) => {
          touchEndX = e.changedTouches[0].screenX;
          const touchEndY = e.changedTouches[0].screenY;
          const diffX = touchStartX - touchEndX;
          const diffY = Math.abs(touchStartY - touchEndY);

          // 横方向のスワイプのみ反応（縦スクロールを妨げない）
          if (Math.abs(diffX) > minSwipeDistance && Math.abs(diffX) > diffY) {
            if (diffX > 0) this.moveToNext();  // 左スワイプ → 次へ
            else this.moveToPrev();            // 右スワイプ → 前へ
          }
        }, { passive: true });
      }

      makeActive(index) {
        const navItems = document.querySelectorAll('.slider-navigation a');
        this.items.forEach((item, i) => {
          item.classList.toggle('is-active', i === index);
          navItems[i]?.classList.toggle('is-active', i === index);
        });
      }

      getSlideType(slide) {
        const classes = slide.className.split(' ');
        for (const cls of classes) {
          if (cls.startsWith('slide-') && cls !== 'slider__item') {
            return cls;
          }
        }
        return 'slide-message';
      }

      playEnterAnimation(index) {
        const slide = this.items[index];
        const content = slide.querySelector('.slider__content');
        const type = this.getSlideType(slide);

        if (animations[type] && animations[type].enter) {
          return animations[type].enter(content);
        } else {
          gsap.set(content, { visibility: 'visible' });
          return gsap.timeline();
        }
      }

      playLeaveAnimation(index) {
        const slide = this.items[index];
        const content = slide.querySelector('.slider__content');
        const type = this.getSlideType(slide);

        if (animations[type] && animations[type].leave) {
          return animations[type].leave(content);
        } else {
          return gsap.timeline();
        }
      }

      async move(index) {
        if (this.isAnimating || index === this.index || index < 0 || index >= this.items.length) {
          return;
        }

        this.isAnimating = true;

        const masterTl = gsap.timeline({
          onComplete: () => {
            this.isAnimating = false;
          }
        });

        // Leave animation
        masterTl.add(this.playLeaveAnimation(this.index));

        // Slide movement
        masterTl.to(this.container, {
          x: -index * this.slideWidth,
          duration: 0.25,
          ease: 'power3.inOut'
        }, '-=0.1');

        // Enter animation
        masterTl.add(this.playEnterAnimation(index), '-=0.15');

        this.index = index;
        this.makeActive(index);
        this.updateProgress();
      }

      moveToNext() {
        // ループ: 最後のスライドで次へ押すと最初に戻る（デフォルト有効）
        const nextIndex = (this.index + 1) % this.items.length;
        this.move(nextIndex);
      }

      moveToPrev() {
        // ループ: 最初のスライドで前へ押すと最後に行く（デフォルト有効）
        const prevIndex = (this.index - 1 + this.items.length) % this.items.length;
        this.move(prevIndex);
      }

      updateProgress() {
        const progress = ((this.index + 1) / this.items.length) * 100;
        document.getElementById('progress').style.width = progress + '%';
        document.getElementById('slideNumber').textContent = (this.index + 1) + ' / ' + this.items.length;
        this.updateAgendaIndicator();
      }

      // アジェンダインジケーター更新
      // セクション定義: {{AGENDA_SECTIONS}} で設定
      updateAgendaIndicator() {
        const sections = {{AGENDA_SECTIONS}};
        const currentSection = sections.find(s => this.index >= s.start && this.index <= s.end);
        document.querySelectorAll('.agenda-indicator-item').forEach(item => {
          item.classList.toggle('active', item.dataset.section === currentSection?.id);
        });
      }

      // アジェンダインジケータークリックイベント
      bindAgendaEvents() {
        document.querySelectorAll('.agenda-indicator-item').forEach(item => {
          item.addEventListener('click', (e) => {
            e.preventDefault();
            const slideIndex = parseInt(item.dataset.slide, 10);
            this.move(slideIndex);
          });
        });
      }
    }

    // 初期化
    document.addEventListener('DOMContentLoaded', () => {
      const slider = new TweenSlider('#slider');
      slider.bindAgendaEvents();
    });
  </script>
